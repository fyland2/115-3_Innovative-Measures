                function rc4Decrypt(b64Data, password) {
                    var pwdUtf8 = unescape(encodeURIComponent(password));
                    var key = new Uint8Array(pwdUtf8.length);
                    for(var i = 0; i < pwdUtf8.length; i++) {
                        key[i] = pwdUtf8.charCodeAt(i);
                    }
                                                               
                    var binary_string = window.atob(b64Data);
                    var cryptBytes = new Uint8Array(binary_string.length);
                    for (var i = 0; i < binary_string.length; i++) cryptBytes[i] = binary_string.charCodeAt(i);

                    var S = new Int32Array(256);
                    for (var i = 0; i < 256; i++) S[i] = i;
                    var j = 0;
                    for (var i = 0; i < 256; i++) {
                        j = (j + S[i] + key[i % key.length]) % 256;
                        var temp = S[i]; S[i] = S[j]; S[j] = temp;
                    }
                    var x = 0, y = 0;
                    var decryptedBytes = new Uint8Array(cryptBytes.length);

                        x = (x + 1) % 256;
                        y = (y + S[x]) % 256;
                        var temp2 = S[x]; S[x] = S[y]; S[y] = temp2;
                        decryptedBytes[k] = cryptBytes[k] ^ S[(S[x] + S[y]) % 256];
                    }
                    if (typeof TextDecoder !== 'undefined') {
                        return new TextDecoder('utf-8').decode(decryptedBytes);
                    } else {
                        var decryptedStr = "";
                        for (var k = 0; k < decryptedBytes.length; k += 10000) {

                            decryptedStr += String.fromCharCode.apply(null, chunk);
                        }
                        return decodeURIComponent(escape(decryptedStr));
                    }

                function initMap() {
                    var touchRenderer = L.canvas({ padding: 0.5, tolerance: 30 });
                    var mapOptions = { renderer: touchRenderer, preferCanvas: true };
                    
                    // 💡 如果是圖解區，切換成純白畫布模式 (不會載入任何地圖底圖)
                    if (crs_type === "圖解") {
                        mapOptions.crs = L.CRS.Simple;
                        mapOptions.minZoom = -20;
                        mapOptions.maxZoom = 20;
                    }
                    
                    map = L.map('map', mapOptions);
                    
                    var baseLayers = { "空白背景": L.layerGroup() };
                    
                    // 💡 只有非圖解區 (數值區)，才匯入電子地圖與 Google 地圖
                    if (crs_type !== "圖解") {
                        var nlscMap = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', {
                            attribution: '國土測繪中心', maxZoom: 20
                        });
                    var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                        subdomains:['mt0','mt1','mt2','mt3'],
                        attribution: 'Google Maps'
                    });
                    var googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                        subdomains:['mt0','mt1','mt2','mt3'],
                        attribution: 'Google Maps'
                    });
                        
                        baseLayers["國土測繪中心 (通用版)"] = nlscMap;
                        baseLayers["Google 衛星影像"] = googleSat;
                        baseLayers["Google 混合地圖"] = googleHybrid;
                        
                        // 數值區預設開啟測繪中心地圖
                        nlscMap.addTo(map);
                    } else {
                        // 圖解區維持空白背景
                        baseLayers["空白背景"].addTo(map);
                    }
                    layers = {
                        bnp: L.featureGroup().addTo(map),
                        par: L.layerGroup(),
                        ctl: L.layerGroup().addTo(map),
                        ctl2: L.layerGroup(),
                        coa: L.layerGroup(), 
                        upn: L.layerGroup()
                    };

                    var overlays = {
                        "地籍線(BNP)": layers.bnp,
                        "地號(PAR)": layers.par,
                        "圖根(CTL)": layers.ctl
                    };
                    if (data.ctl2 && data.ctl2.length > 0) {
                        overlays["圖根(補建)"] = layers.ctl2;
                    }
                    overlays["界址(COA)"] = layers.coa;
                    overlays["中心樁(UPN)"] = layers.upn;
                    
                    L.control.layers(baseLayers, overlays, { position: 'topright', collapsed: true }).addTo(map);
                    
                    parcelData.forEach(p => { 
                        // 依照系統動態轉換線段端點
                        var latlngPath = p.path.map(pt => to_latlon(pt[0], pt[1]));
                        L.polyline(latlngPath, {color: 'black', weight: 1.2}).addTo(layers.bnp); 
                    });
                                  
                    map.on('mousemove', function(e) {
                        if (crs_type === "圖解") {
                            document.getElementById('coords-info').innerHTML = "Y (北): " + e.latlng.lat.toFixed(2) + ", X (東): " + e.latlng.lng.toFixed(2);
                        } else {
                            // 將游標經緯度逆轉為地政本地坐標
                            var twd = proj4("EPSG:4326", "LOCAL_CRS", [e.latlng.lng, e.latlng.lat]);
                            document.getElementById('coords-info').innerHTML = "Y (北): " + twd[1].toFixed(2) + ", X (東): " + twd[0].toFixed(2);
                        }
                    });
                    
                    map.on('moveend zoomend overlayadd', scheduleRender);
                    checkAndSyncCloud();
                }

                function toggleSidebar() {
                    document.getElementById('sidebar').classList.toggle('collapsed');
                    setTimeout(function() { map.invalidateSize(); }, 300);
                }

                function changeSize(type, delta) {
                    if (type === 'font') {
                        currentFontSize += delta;
                        if (currentFontSize < 8) currentFontSize = 8;
                        if (currentFontSize > 60) currentFontSize = 60;
                        document.getElementById('font-size-display').innerText = currentFontSize;
                    } else if (type === 'point') {
                        currentPointSize += delta;
                        if (currentPointSize < 1) currentPointSize = 1;
                        if (currentPointSize > 30) currentPointSize = 30;
                        document.getElementById('point-size-display').innerText = currentPointSize;
                    }
                    scheduleRender();
                }

                function zoomToBNP() {
                    var bounds = layers.bnp.getBounds();
                    if(bounds.isValid()) map.fitBounds(bounds);
                }
                
                function zoomTo(type) {
                    if(type === 'bnp') {
                        zoomToBNP();
                    } else {
                        var points = data[type].map(i => to_latlon(i.pos[0], i.pos[1]));
                        if(points.length > 0) {
                            var b = L.latLngBounds(points);
                            map.fitBounds(b);
                            if(!map.hasLayer(layers[type])) map.addLayer(layers[type]);
                            scheduleRender();
                        } else { alert("該圖層無資料！"); }
                    }
                }
                
                function compressAndPreview(input, id) {
                    if (input.files && input.files[0]) {
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            var img = new Image();
                            img.src = e.target.result;
                            img.onload = function () {
                                var canvas = document.createElement('canvas');
                                var ctx = canvas.getContext('2d');
                                // 【效能優化】將寬度限制由 800 降至 600，進一步減少儲存於雲端的 Base64 體積
                                var maxWidth = 600; 
                                var scale = maxWidth / img.width;
                                if (scale > 1) scale = 1; // 避免小圖片被放大
                                canvas.width = img.width * scale;
                                canvas.height = img.height * scale;
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                var dataUrl = canvas.toDataURL('image/jpeg', 0.5); 
                                document.getElementById('preview-' + id).src = dataUrl;
                                window['currentImg_' + id] = dataUrl;
                            };
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                }
                
                function updateStatusToCloud(pid) {
                    if (!navigator.onLine) {
                        alert('目前沒有偵測到網路連線，無法正確傳送圖根遺失檔案。');
                        return;
                    }

                    var userKey = prompt("請輸入職員編號：");
                    if (userKey === null || userKey === "") {
                        alert("已取消同步操作。");
                        return;
                    }
                    var statusSelect = document.getElementById('status-select-' + pid);
                    var status = statusSelect.value;
                    
                    if (status === 'unreported') {
                        alert("請選擇「保存完好」或「遺失」狀態後再同步！");
                        return;
                    }
                    
                    var btn = document.querySelector('.btn-save');
                    var imgData = window['currentImg_' + pid] || "";
                    
                    if(!gasUrl) {
                        alert('目前沒有偵測到網路連線，僅為本地模擬。');
                        return;
                    }
                    btn.disabled = true;
                    btn.innerText = '雲端寫入中...';

                    var xhr = new XMLHttpRequest();
                    xhr.open("POST", gasUrl, true);
                    xhr.onreadystatechange = function() {
                        if (xhr.readyState === 4) {
                            btn.disabled = false;
                            btn.innerText = '同步狀態至雲端';
                            try {
                                var resp = JSON.parse(xhr.responseText);
                                if (resp.result === 'success') {
                                    alert('已成功同步至 Google Sheet！');
                                    var target = [...data.ctl, ...(data.ctl2 || [])].find(p => p.id === pid);
                                    if (target) {
                                        target.status = status;
                                        target.date = new Date().toISOString(); 
                                        if (imgData !== "") {
                                            target.image = imgData;
                                        }
                                    }
                                    if(typeof gtag !== 'undefined') {
                                        gtag('event', 'report_point', { 'point_id': pid, 'status': status, 'section': sectionName });
                                    }
                                    scheduleRender();
                                } else {
                                    alert('同步被拒絕：' + resp.message);
                                }
                            } catch(e) {
                                alert('回傳格式錯誤。');
                            }
                        }
                    };
                    xhr.send(JSON.stringify({
                        section: sectionName, 
                        id: pid,
                        status: status,
                        image: imgData,
                        timestamp: new Date().toLocaleString('zh-TW', {hour12: false}), 
                        key: userKey 
                    }));
                }

                function scheduleRender() {
                    clearTimeout(renderTimer);                                                                                   
                    renderTimer = setTimeout(render, 150);
                }

                function render() {
                    var b = map.getBounds().pad(0.2), z = map.getZoom(), s = currentFontSize;
                    ['par', 'ctl', 'ctl2', 'coa', 'upn'].forEach(k => {
                        var group = layers[k];
                        if (!map.hasLayer(group)) return;
                        group.clearLayers();
                        // 💡 根據圖解或數值區給予不同的自動隱藏縮放等級
                        var showLabel = true;
                        if (crs_type === "圖解") {
                        if (k === 'par' && z < -3) showLabel = false; 
                        if ((k === 'ctl' || k === 'ctl2') && z < -2) showLabel = false; 
                        if (k === 'upn' && z < -2) showLabel = false; 
                        if (k === 'coa' && z < 1) showLabel = false;  
                        } else {
                            if (k === 'par' && z < 16) showLabel = false; 
                            if ((k === 'ctl' || k === 'ctl2') && z < 15) showLabel = false; 
                            if (k === 'upn' && z < 16) showLabel = false; 
                            if (k === 'coa' && z < 18) showLabel = false; 
                        } 
                        data[k].forEach(i => {
                            var latlngPos = to_latlon(i.pos[0], i.pos[1]);
                            if (b.contains(latlngPos)) {
                                var isLost = (i.status === 'lost');
                                var isUnreported = (i.status === 'unreported' || !i.status);
                                var isActive = (i.status === 'active');

                                var fillOp = isUnreported ? 0.0 : 1.0; 
                                var mainColor = isLost ? '#d3d3d3' : ((k=='ctl'||k=='ctl2')?'red':(k=='upn'?'green':'#666'));
                                var labelColor = isLost ? '#d3d3d3' : (k=='par'?'blue':((k=='ctl'||k=='ctl2')?'red':(k=='upn'?'green':'#666')));

                                if (k !== 'par') {
                                    var marker = L.circleMarker(latlngPos, { radius: currentPointSize, color: mainColor, fillOpacity: fillOp, weight: isUnreported ? 2 : 1 }).addTo(group);
                                    
                                    if (k !== 'coa') {
                                        marker.bindPopup(function() {
                                            var cloudUrl = i.image || "";
                                            var imgSrc = './photos/' + i.id + '.jpg';
                                            var photoLinkHtml = '';

                                            // 💡 這裡的 \w 已無須跳脫，直接寫給 JS 看即可
                                            if (cloudUrl !== "") {
                                                if (cloudUrl.startsWith("data:image")) {
                                                    imgSrc = cloudUrl; 
                                                } else {
                                                    var driveIdMatch = cloudUrl.match(/[-\w]{25,}/);
                                                    if (driveIdMatch) {
                                                        var fileId = driveIdMatch[0];
                                                        // 💡 嘗試使用 Google Thumbnail API 來顯示預覽圖
                                                        imgSrc = "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w600";
                                                        
                                                        // 提供原本的 Drive 預覽網址作為備案按鈕
                                                        var viewUrl = "https://drive.google.com/file/d/" + fileId + "/view";
                                                        photoLinkHtml = '<a href="' + viewUrl + '" target="_blank" style="display:block; margin-top:8px; padding: 5px; background: #e8f0fe; text-align:center; color:#1a73e8; border-radius: 4px; text-decoration:none; font-weight:bold; font-size:14px;">🔗 點此開啟雲端照片</a>';
                                                    } else {
                                                        imgSrc = cloudUrl;
                                                    }
                                                }
                                            }
                                            
                                            var noPhotoSvg = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect width=%22200%22 height=%22150%22 fill=%22%23f4f4f4%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2216px%22 fill=%22%23888%22%3E無照片資訊%3C/text%3E%3C/svg%3E";

                                            return '<div class="popup-content">' +
                                                '<b>點號：' + i.id + '</b><br>' +
                                                '座標(Y)：' + i.pos[0].toFixed(3) + '<br>' +
                                                '座標(X)：' + i.pos[1].toFixed(3) + '<br>' +
                                                '更新日期：' + formatTime(i.date) + '<br>' +
                                                '<hr>' +
                                                '選擇狀態：' +
                                                '<select id="status-select-' + i.id + '">' +
                                                '<option value="unreported" ' + (isUnreported ? 'selected' : '') + ' style="display:none">-- 待查報 --</option>' +
                                                '<option value="active" ' + (isActive ? 'selected' : '') + '>保存完好</option>' +
                                                '<option value="lost" ' + (isLost ? 'selected' : '') + '>遺失</option>' +
                                                '</select><br>' +
                                                '現場拍照/上傳：<br>' +
                                                '<input type="file" accept="image/*" onchange="compressAndPreview(this, \'' + i.id + '\')" style="font-size:11px;">' +
                                                '<img id="preview-' + i.id + '" class="popup-img" src="' + imgSrc + '" onerror="this.src=\'' + noPhotoSvg + '\'">' +
                                                photoLinkHtml + 
                                                '<button class="btn-save" onclick="updateStatusToCloud(\'' + i.id + '\')">同步狀態至雲端</button>' +
                                                '</div>';
                                        });
                                    }  
                                }
                                if (showLabel) {
                                    L.marker(latlngPos, {
                                        icon: L.divIcon({
                                            className: 'label-box',
                                            html: '<span style="font-size:'+s+'px; color:'+labelColor+'">'+i.id+'</span>',
                                            iconAnchor: [-5, 15]
                                        })
                                    }).addTo(group);
                                }    
                            }
                        });
                    });
                }
           
                function find() {
                    var q = document.getElementById('sq').value.trim();
                    if (!q) return;
                    if(typeof gtag !== 'undefined') {
                        gtag('event', 'search_point', { 'search_term': q, 'section': sectionName });
                    }
                    if (window.searchHighlight) { map.removeLayer(window.searchHighlight); }
                    var isParcel = /^[0-9\-]+$/.test(q);  
                    if (isParcel) {
                        var targetParcel = parcelData.find(p => p.id == q);
                        if (targetParcel) {
                            var latlngPath = targetParcel.path.map(pt => to_latlon(pt[0], pt[1]));
                            var bounds = L.latLngBounds(latlngPath);
                            map.fitBounds(bounds);
                            
                            window.searchHighlight = L.polygon(latlngPath, {
                                color: 'red',
                                weight: 2,
                                fillColor: 'pink',
                                fillOpacity: 0.75
                            }).addTo(map);
                            if (!map.hasLayer(layers['par'])) map.addLayer(layers['par']);
                        } else {
                            var fallbackPar = data.par.find(i => i.id == q);
                            if (fallbackPar) {
                                var zoomLvl = (crs_type === "圖解") ? 4 : 18;
                                map.flyTo(to_latlon(fallbackPar.pos[0], fallbackPar.pos[1]), zoomLvl);
                                if (!map.hasLayer(layers['par'])) map.addLayer(layers['par']);
                                alert('該地號無地籍線範圍資料，已定位至地號文字中心。');
                            } else {
                                alert('圖資中找不到地號：' + q);
                            }
                        }
                    } else {                              
                        var t = [...data.ctl, ...data.ctl2, ...data.upn].find(i => i.id == q); 
                        if(t) {
                            var zoomLvl = (crs_type === "圖解") ? 4 : 18;
                            map.flyTo(to_latlon(t.pos[0], t.pos[1]), zoomLvl);
                            ['par', 'ctl', 'ctl2', 'upn'].forEach(k => {
                               if(data[k] && data[k].find(x => x.id == q) && !map.hasLayer(layers[k])) map.addLayer(layers[k]);
                            });
                        } else { alert('找不到編號！'); }
                    }
                } 

                function safeRenderAndZoom() {
                    try {
                        zoomToBNP(); 
                    } catch(e) {
                        console.error("Zoom error:", e);
                    }
                }
                
                function checkAndSyncCloud() {
                    if (!navigator.onLine) {
                        alert("目前沒有偵測到網路連線，無法正確傳送或下載圖根狀態檔案。\\n（將使用本地歷史資料）");
                        document.getElementById('sync-status').innerText = "● 離線模式 (僅顯示本地資料)";
                        document.getElementById('sync-status').style.color = "red";
                        setTimeout(safeRenderAndZoom, 500);
                    } else if (gasUrl !== "") {
                        document.getElementById('sync-status').innerText = "● 雲端資料同步中...";
                        document.getElementById('sync-status').style.color = "orange";
                        
                        fetch(gasUrl + "?section=" + sectionName)
                        .then(res => res.text()) 
                        .then(text => {
                            try {
                                var cloudResp = JSON.parse(text);
                                if(cloudResp.result === 'success') {
                                    var cloudData = cloudResp.data;
                                    cloudData.forEach(cd => {
                                        ['ctl', 'ctl2'].forEach(k => {
                                            var pt = data[k].find(p => p.id === cd.id);
                                            if (pt) {
                                                pt.status = cd.status;
                                                pt.date = cd.date;
                                                pt.image = cd.image; 
                                            }
                                        });
                                    });
                                    document.getElementById('sync-status').innerText = "● 雲端資料已最新";
                                    document.getElementById('sync-status').style.color = "green";
                                } else {
                                    document.getElementById('sync-status').innerText = "● 雲端拒絕連線：" + cloudResp.message;
                                    document.getElementById('sync-status').style.color = "red";
                               }
                            } catch(e) {
                                console.error("解析失敗，GAS回傳內容：", text);
                                document.getElementById('sync-status').innerText = "● 雲端格式錯誤 (請確認部署權限為'所有人')";
                                document.getElementById('sync-status').style.color = "red";
                            }
                            scheduleRender(); 
                            setTimeout(safeRenderAndZoom, 500);
                        })
                        .catch(err => {
                            document.getElementById('sync-status').innerText = "● 雲端伺服器無回應";
                            document.getElementById('sync-status').style.color = "red";
                            setTimeout(safeRenderAndZoom, 500);
                        });
                    } else {
                        document.getElementById('sync-status').innerText = "● 尚未設定雲端連結";
                        document.getElementById('sync-status').style.color = "gray";
                        setTimeout(safeRenderAndZoom, 500);
                    }
                }
            </script>
        </body>
        </html>
